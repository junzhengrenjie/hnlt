<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ksky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="60%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="kwater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="url(#ksky)"/>
  <!-- Snow mountains -->
  <polygon points="0,220 80,100 180,180 280,80 400,160 520,90 640,170 800,100 800,220" fill="#f1f5f9"/>
  <polygon points="280,80 300,50 320,50 340,80" fill="#fff"/>
  <polygon points="520,90 540,60 560,60 580,90" fill="#fff"/>
  <!-- Forest layer -->
  <polygon points="0,220 100,170 200,200 300,160 400,190 500,170 600,195 700,165 800,190 800,220" fill="#064e3b"/>
  <!-- Water -->
  <rect x="0" y="215" width="800" height="235" fill="url(#kwater)"/>
  <!-- Morning mist -->
  <ellipse cx="400" cy="215" rx="300" ry="15" fill="#fff" opacity="0.2"/>
  <ellipse cx="600" cy="220" rx="200" ry="12" fill="#fff" opacity="0.15"/>
  <!-- Village cabins -->
  <rect x="100" y="205" width="18" height="14" fill="#78350f"/>
  <polygon points="97,205 109,195 121,205" fill="#92400e"/>
  <rect x="140" y="208" width="15" height="11" fill="#78350f"/>
  <polygon points="137,208 147,199 158,208" fill="#92400e"/>
</svg>
