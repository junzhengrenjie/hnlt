<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="lugusky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#e0d5ff"/>
    </linearGradient>
    <linearGradient id="luguwater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="url(#lugusky)"/>
  <!-- Sunset glow -->
  <circle cx="650" cy="140" r="40" fill="#f59e0b" opacity="0.6"/>
  <!-- Mountains -->
  <polygon points="0,220 80,130 160,180 250,100 350,160 450,120 550,170 650,110 750,160 800,140 800,220" fill="#4c1d95"/>
  <polygon points="0,220 100,160 180,210 280,150 380,200 480,160 580,210 680,150 800,190 800,220" fill="#2e1065"/>
  <!-- Water -->
  <rect x="0" y="215" width="800" height="235" fill="url(#luguwater)"/>
  <!-- Boat -->
  <ellipse cx="300" cy="300" rx="40" ry="10" fill="#78350f"/>
  <path d="M270,290 Q300,270 330,290" stroke="#78350f" stroke-width="3" fill="none"/>
  <!-- Water reflections -->
  <ellipse cx="200" cy="260" rx="60" ry="5" fill="#a78bfa" opacity="0.4"/>
  <ellipse cx="500" cy="330" rx="80" ry="6" fill="#c4b5fd" opacity="0.3"/>
  <!-- Reeds -->
  <line x1="80" y1="215" x2="75" y2="200" stroke="#065f46" stroke-width="2"/>
  <line x1="100" y1="215" x2="95" y2="198" stroke="#065f46" stroke-width="2"/>
  <line x1="700" y1="215" x2="705" y2="200" stroke="#065f46" stroke-width="2"/>
</svg>
