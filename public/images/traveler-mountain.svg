<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="tsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" fill="url(#tsky)"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="300" cy="30" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="500" cy="70" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="700" cy="40" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- Mountains -->
  <polygon points="0,280 150,150 300,220 450,120 580,200 700,140 800,180 800,280" fill="#4c1d95"/>
  <polygon points="0,280 120,190 250,250 400,180 550,240 680,200 800,230 800,280" fill="#2e1065"/>
  <!-- Ground -->
  <rect x="0" y="270" width="800" height="180" fill="#1e1b4b"/>
  <!-- Person silhouette standing on a rock -->
  <rect x="380" y="240" width="40" height="8" rx="2" fill="#312e81"/>
  <circle cx="400" cy="215" r="12" fill="#1e1b4b"/>
  <rect x="395" y="225" width="10" height="22" fill="#1e1b4b"/>
  <!-- Arms extended -->
  <line x1="388" y1="230" x2="365" y2="218" stroke="#1e1b4b" stroke-width="5" stroke-linecap="round"/>
  <line x1="412" y1="230" x2="435" y2="218" stroke="#1e1b4b" stroke-width="5" stroke-linecap="round"/>
  <!-- Backpack -->
  <rect x="403" y="228" width="8" height="12" rx="2" fill="#312e81"/>
</svg>
