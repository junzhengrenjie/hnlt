<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="40%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
    <linearGradient id="mt1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78716c"/>
      <stop offset="100%" style="stop-color:#57534e"/>
    </linearGradient>
    <linearGradient id="mt2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8a29e"/>
      <stop offset="100%" style="stop-color:#78716c"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="260" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="580" cy="160" r="50" fill="#fbbf24" opacity="0.8"/>
  <!-- Distant mountains -->
  <polygon points="0,260 120,150 200,200 300,120 400,180 500,140 600,190 700,130 800,180 800,260" fill="url(#mt2)"/>
  <!-- Near mountains -->
  <polygon points="0,260 100,200 180,240 280,180 380,230 480,190 560,240 650,170 750,230 800,200 800,260" fill="url(#mt1)"/>
  <!-- Ground -->
  <rect x="0" y="250" width="800" height="200" fill="#57534e"/>
  <!-- Buildings silhouettes -->
  <rect x="120" y="210" width="30" height="45" rx="2" fill="#44403c"/>
  <rect x="155" y="200" width="25" height="55" rx="2" fill="#3f3f46"/>
  <rect x="185" y="215" width="35" height="40" rx="2" fill="#44403c"/>
  <rect x="250" y="205" width="28" height="50" rx="2" fill="#3f3f46"/>
  <rect x="400" y="210" width="32" height="45" rx="2" fill="#44403c"/>
  <rect x="500" y="195" width="26" height="60" rx="2" fill="#3f3f46"/>
  <!-- Windows -->
  <rect x="126" y="218" width="6" height="5" rx="1" fill="#fbbf24" opacity="0.8"/>
  <rect x="135" y="218" width="6" height="5" rx="1" fill="#fbbf24" opacity="0.6"/>
  <rect x="161" y="215" width="6" height="8" rx="1" fill="#fbbf24" opacity="0.7"/>
  <rect x="256" y="213" width="6" height="5" rx="1" fill="#fbbf24" opacity="0.9"/>
  <rect x="506" y="205" width="6" height="6" rx="1" fill="#fbbf24" opacity="0.7"/>
</svg>
