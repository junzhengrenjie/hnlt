<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bluesky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="60%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#cffafe"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
  </defs>
  <rect width="800" height="240" fill="url(#bluesky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="60" rx="60" ry="20" fill="#fff" opacity="0.6"/>
  <ellipse cx="550" cy="80" rx="80" ry="22" fill="#fff" opacity="0.5"/>
  <!-- Mountains -->
  <polygon points="0,240 100,120 200,190 300,100 400,170 500,110 600,180 700,130 800,160 800,240" fill="#1e293b"/>
  <!-- Trees on mountains -->
  <circle cx="100" cy="120" r="15" fill="#064e3b"/>
  <circle cx="300" cy="100" r="18" fill="#065f46"/>
  <circle cx="500" cy="110" r="14" fill="#064e3b"/>
  <!-- Water -->
  <rect x="0" y="230" width="800" height="220" fill="url(#water)"/>
  <!-- Water highlights -->
  <ellipse cx="200" cy="300" rx="80" ry="8" fill="#67e8f9" opacity="0.4"/>
  <ellipse cx="500" cy="350" rx="100" ry="10" fill="#67e8f9" opacity="0.3"/>
  <ellipse cx="350" cy="270" rx="50" ry="5" fill="#fff" opacity="0.2"/>
  <!-- Banks -->
  <rect x="0" y="230" width="800" height="15" fill="url(#green)"/>
  <circle cx="50" cy="230" r="12" fill="#22c55e"/>
  <circle cx="750" cy="230" r="15" fill="#16a34a"/>
</svg>
