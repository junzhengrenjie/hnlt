<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="table" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="#451a03"/>
  <!-- Table surface -->
  <rect x="0" y="280" width="800" height="170" fill="#78350f"/>
  <rect x="0" y="278" width="800" height="8" fill="#92400e"/>
  <!-- Bowl 1 (hot pot) -->
  <ellipse cx="250" cy="300" rx="90" ry="35" fill="#b45309"/>
  <ellipse cx="250" cy="290" rx="85" ry="30" fill="#d97706"/>
  <ellipse cx="250" cy="285" rx="70" ry="22" fill="#f59e0b"/>
  <!-- Steam -->
  <path d="M230,260 Q225,240 235,220" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M260,255 Q255,235 265,215" stroke="#fff" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M240,265 Q250,245 240,225" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Plate 2 -->
  <ellipse cx="500" cy="310" rx="70" ry="28" fill="#fef3c7"/>
  <ellipse cx="500" cy="308" rx="60" ry="22" fill="#fde68a"/>
  <!-- Plate 3 (small) -->
  <ellipse cx="650" cy="315" rx="45" ry="18" fill="#fef3c7"/>
  <ellipse cx="650" cy="313" rx="38" ry="14" fill="#fde68a"/>
  <!-- Chopsticks -->
  <line x1="520" y1="280" x2="560" y2="350" stroke="#78350f" stroke-width="3"/>
  <line x1="535" y1="280" x2="575" y2="350" stroke="#78350f" stroke-width="3"/>
  <!-- Additional warm glow -->
  <circle cx="250" cy="280" r="120" fill="#fbbf24" opacity="0.08"/>
  <!-- Background decoration -->
  <circle cx="700" cy="100" r="30" fill="#fbbf24" opacity="0.08"/>
  <circle cx="100" cy="80" r="40" fill="#f97316" opacity="0.06"/>
</svg>
