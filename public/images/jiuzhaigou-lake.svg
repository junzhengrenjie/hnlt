<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="jsky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="jwater" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="30%" style="stop-color:#14b8a6"/>
      <stop offset="60%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="url(#jsky)"/>
  <!-- Autumn trees -->
  <circle cx="60" cy="210" r="30" fill="#f97316"/>
  <circle cx="100" cy="200" r="25" fill="#fbbf24"/>
  <circle cx="140" cy="215" r="28" fill="#ef4444"/>
  <circle cx="660" cy="205" r="30" fill="#f97316"/>
  <circle cx="710" cy="200" r="25" fill="#fbbf24"/>
  <circle cx="750" cy="210" r="28" fill="#ef4444"/>
  <!-- Mountains -->
  <polygon points="0,220 100,100 200,170 320,90 440,160 560,110 680,170 800,120 800,220" fill="#1e293b"/>
  <polygon points="0,220 120,140 220,200 340,130 460,190 580,150 700,200 800,150 800,220" fill="#475569"/>
  <!-- Colorful water -->
  <rect x="0" y="215" width="800" height="235" fill="url(#jwater)"/>
  <!-- Underwater patterns -->
  <ellipse cx="200" cy="300" rx="50" ry="8" fill="#22d3ee" opacity="0.4"/>
  <ellipse cx="450" cy="340" rx="60" ry="10" fill="#22c55e" opacity="0.3"/>
  <ellipse cx="600" cy="290" rx="40" ry="6" fill="#14b8a6" opacity="0.4"/>
</svg>
